apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: talentsync-ingress
  namespace: talentsync
  labels:
    app: talentsync
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  tls:
    - hosts:
        - talentsync.talentsync.com
        - api.talentsync.talentsync.com
      secretName: talentsync-tls
  rules:
    - host: talentsync.talentsync.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: talentsync-frontend
                port:
                  number: 3000
    - host: api.talentsync.talentsync.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: talentsync-backend
                port:
                  number: 3001
