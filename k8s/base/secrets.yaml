apiVersion: v1
kind: Secret
metadata:
  name: talentsync-secrets
  namespace: talentsync
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://user:CHANGE_ME@db.example.com:5432/talentsync_db?sslmode=require"
  
  # Redis
  REDIS_HOST: "redis.example.com"
  REDIS_PASSWORD: "CHANGE_ME"
  
  # JWT
  JWT_SECRET: "CHANGE_ME_TO_STRONG_SECRET"
  JWT_REFRESH_SECRET: "CHANGE_ME_TO_STRONG_SECRET"
  
  # Encryption
  ENCRYPTION_KEY: "CHANGE_ME_64_HEX_CHARS"
  TOKEN_ENCRYPTION_KEY: "CHANGE_ME_64_HEX_CHARS"
  
  # S3
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"
  
  # SMTP
  SMTP_USER: "noreply@talentsync.com"
  SMTP_PASS: "CHANGE_ME"
  
  # Twilio
  TWILIO_ACCOUNT_SID: "CHANGE_ME"
  TWILIO_AUTH_TOKEN: "CHANGE_ME"
  TWILIO_PHONE_NUMBER: "+1234567890"
  
  # WhatsApp
  WHATSAPP_BUSINESS_ID: "CHANGE_ME"
  WHATSAPP_ACCESS_TOKEN: "CHANGE_ME"
---
# Note: In production, use external secrets operator or sealed secrets
# kubectl create secret generic talentsync-secrets --from-env-file=.env.production -n talentsync
