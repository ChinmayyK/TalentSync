apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: talentsync

resources:
  - ../../base

commonLabels:
  environment: production

# Production-specific patches
patches:
  # Increase resources for production
  - target:
      kind: Deployment
      name: talentsync-backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
  - target:
      kind: Deployment
      name: talentsync-frontend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

# Production uses base ConfigMap as-is
# Secrets should be managed via external secrets operator in production
