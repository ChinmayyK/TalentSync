apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: talentsync-staging

resources:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

# Staging-specific patches
patches:
  # Reduce replicas for staging
  - target:
      kind: Deployment
      name: talentsync-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: talentsync-frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Reduce HPA min replicas
  - target:
      kind: HorizontalPodAutoscaler
      name: talentsync-backend-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
      name: talentsync-frontend-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

# Staging ConfigMap overrides
configMapGenerator:
  - name: talentsync-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - FRONTEND_URL=https://staging.talentsync.talentsync.com
      - API_URL=https://api-staging.talentsync.talentsync.com
